<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول - نظام إدارة التكاليف</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family:'Cairo',sans-serif; background:linear-gradient(135deg,#1a3a5c 0%,#2563a8 100%); min-height:100vh; display:flex; align-items:center; justify-content:center; }
    .login-card { background:#fff; border-radius:20px; padding:44px 40px; width:100%; max-width:420px; box-shadow:0 20px 60px rgba(0,0,0,0.25); }
    .login-icon { width:70px; height:70px; background:linear-gradient(135deg,#1a3a5c,#2563a8); border-radius:18px; display:flex; align-items:center; justify-content:center; font-size:2rem; margin:0 auto 20px; }
    .login-title { text-align:center; font-size:1.4rem; font-weight:800; color:#1a3a5c; margin-bottom:6px; }
    .login-sub { text-align:center; color:#6c757d; font-size:0.85rem; margin-bottom:28px; }
    .form-control { border-radius:10px; padding:11px 14px; font-family:'Cairo',sans-serif; border:1.5px solid #dee2e6; }
    .form-control:focus { border-color:#2563a8; box-shadow:0 0 0 3px rgba(37,99,168,0.12); }
    .form-label { font-weight:600; font-size:0.88rem; color:#1a3a5c; }
    .btn-login { background:linear-gradient(135deg,#1a3a5c,#2563a8); color:#fff; border:none; border-radius:10px; padding:12px; font-family:'Cairo',sans-serif; font-weight:700; font-size:1rem; width:100%; cursor:pointer; transition:opacity 0.2s; }
    .btn-login:hover { opacity:0.92; }
    .error-msg { background:#fff3f3; border:1px solid #ffcdd2; border-radius:8px; padding:10px 14px; color:#c62828; font-size:0.85rem; margin-bottom:16px; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-icon">🏗️</div>
    <h1 class="login-title">نظام إدارة التكاليف</h1>
    <p class="login-sub">Construction Cost Management System</p>
    {% if form.errors %}
      <div class="error-msg"><i class="bi bi-exclamation-circle me-1"></i>اسم المستخدم أو كلمة المرور غير صحيحة.</div>
    {% endif %}
    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label">اسم المستخدم</label>
        <input type="text" name="username" class="form-control" placeholder="أدخل اسم المستخدم" dir="rtl" autofocus required>
      </div>
      <div class="mb-4">
        <label class="form-label">كلمة المرور</label>
        <input type="password" name="password" class="form-control" placeholder="أدخل كلمة المرور" required>
      </div>
      <input type="hidden" name="next" value="{{ next }}">
      <button type="submit" class="btn-login">تسجيل الدخول</button>
    </form>
    <p class="text-center text-muted mt-4 mb-0" style="font-size:0.8rem">نظام إدارة مصروفات الإنشاء والبناء</p>
  </div>
</body>
</html>
